version: '3.8'

services:

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    ports:
      - 8380:80
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD: examplepass
      WORDPRESS_DB_NAME: exampledb
      WORDPRESS_AUTH_KEY: "&(#ui(yP/3 DF^AbN#; $C .dH#Dt.F`h2)@8QI U#c`jmw{eYVz8oAko`f5LvM]"
      WORDPRESS_SECURE_AUTH_KEY: "c:z6zyUvRXvn,B V!};]Wm*(?R8Tr+2hy^]hQp63/(os23K6jZgf:)=8JUp2(,O!"
      WORDPRESS_NONCE_KEY: "riTM* MT=xs/M0wz#?:Be11cO]Qy=^)q%U[gs=e*66qJeo0{i6(eT? <(DB?]XD{"
      WORDPRESS_AUTH_SALT: "(+^8#Fm>duWX*n(LZdA]_S7^qV&Wvm46gy;~<]1/[m)SB=GX;LBOeM+RR^n=gOXF"
      WORDPRESS_SECURE_AUTH_SALT: "UGWUVv_0^gTip]Qfa2I1`ns:yGJP{(u0#@rx|B#;G5I,Q|@K_3IM+D<X=}n;!r2G"
    volumes:
      - wordpress:/var/www/html
      - ./:/var/www/html/wp-content/themes/sacredphysicalitytheme

  db:
    image: mysql:5.7
    restart: unless-stopped
    ports:
      - 53306:3306
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD: examplepass
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - db:/var/lib/mysql

volumes:
  wordpress:
  db:
